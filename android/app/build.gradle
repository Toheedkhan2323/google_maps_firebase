plugins {
    id "com.android.application"
    // START: FlutterFire Configuration
    id 'com.google.gms.google-services'
    // END: FlutterFire Configuration
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.example.google_maps_firebase"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        applicationId = "com.example.google_maps_firebase"
        minSdk = 23
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName

        // MISSING 1: MultiDex enable karna zaroori hai Firebase/Maps ke liye
        multiDexEnabled true
    }

    // MISSING 2: Duplicate files aur resource merging errors ko fix karne ke liye
    packagingOptions {
        resources {
            excludes += '/META-INF/{AL2.0,LGPL2.1}'
            excludes += 'META-INF/gradle/incremental.annotation.processors'
            merges += 'META-INF/common.kotlin_module'
            merges += 'META-INF/*.kotlin_module'
            pickFirst 'META-INF/DEPENDENCIES'
            pickFirst 'META-INF/LICENSE'
            pickFirst 'META-INF/LICENSE.txt'
            pickFirst 'META-INF/license.txt'
            pickFirst 'META-INF/NOTICE'
            pickFirst 'META-INF/NOTICE.txt'
            pickFirst 'META-INF/notice.txt'
            pickFirst 'META-INF/ASL2.0'
            pickFirst 'META-INF/*.kotlin_module' 
        }
    }

    buildTypes {
        release {
            signingConfig = signingConfigs.debug
        }
    }
}

flutter {
    source = "../.."
}

// MISSING 3: Dependencies block add karein
dependencies {
    implementation 'androidx.multidex:multidex:2.0.1'
}